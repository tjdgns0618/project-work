# 통합 테스트(@SpringBootTest) 전용 프로필.
# 운영 coffee DB를 건드리지 않도록 별도 coffee_test DB에 연결한다.
# coffee 유저는 coffee DB에만 권한이 있어 test DB를 만들 수 없으므로,
# 스키마 자동 생성(createDatabaseIfNotExist)을 위해 root 계정을 사용한다. (로컬 docker 한정)
# Redis·Kafka 설정은 application.yml을 그대로 상속한다.
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${TEST_DB_NAME:coffee_test}?createDatabaseIfNotExist=true
    username: ${TEST_DB_USER:root}
    password: ${TEST_DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: create-drop   # 테스트 시작 시 스키마 생성, 종료 시 삭제
